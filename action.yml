name: 'DDEV Commit Message Checker'
description: 'Check the commit message against a regex pattern'
author: 'DDEV Foundation'
inputs:
  pattern:
    description: 'A regex pattern to check if a commit message is valid.'
    required: true
  flags:
    description: 'Expression flags change how the expression is interpreted.'
    required: false
    default: 'gm'
  error:
    description: 'A error message which will be returned in case of an error.'
    required: true
  excludeTitle:
    description:
      'Setting this input to true will exclude the Pull Request title from the
      check.'
    required: false
    default: 'false'
  excludeDescription:
    description:
      'Setting this input to true will exclude the Pull Request description from
      the check.'
    required: false
    default: 'false'
  checkAllCommitMessages:
    description:
      'Setting this input to true will check all Pull Request commits'
    required: false
    default: 'false'
  accessToken:
    description:
      'GITHUB_TOKEN used to fetch pull request commits. Required when
      checkAllCommitMessages is true.'
    required: false
runs:
  using: node24
  main: dist/index.js
branding:
  icon: 'check'
  color: 'blue'
